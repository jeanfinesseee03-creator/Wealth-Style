<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wealth Style</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="brand">
    <img src="logo.png" alt="Wealth Style Logo" class="logo">

    <div class="brand-text">
      <h1>WEALTH STYLE</h1>
      <p>WEAR YOUR WEALTH</p>
    </div>
  </div>

  <nav>

<section id="home" class="hero">
  <div class="stars"></div>
  <h2>Wear Your Wealth</h2>
  <p>Luxury streetwear for those who move differently.</p>
</section>

<section id="shop">
  <h2>Featured Collection</h2>

  <div class="products">
    <div class="product">
      <img src="images/product1.jpg" alt="Product">
      <h3>Your Product Name</h3>
      <p>$45</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="images/product2.jpg" alt="Product">
      <h3>Your Product Name</h3>
      <p>$85</p>
      <button>Add to Cart</button>
    </div>
  </div>
</section>

<section id="cart">
  <h2>Your Cart</h2>
  <p>Cart functionality coming soon.</p>
</section>

<section id="contact">
  <h2>Contact Us</h2>
  <form>
    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<script src="script.js"></script>
</body>
</html>
