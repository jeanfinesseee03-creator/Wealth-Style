<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Themed Background</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #000814;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 1rem;
        }

        nav a:hover {
            color: gold;
        }

        .space-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 60px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 50px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 10px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s infinite;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle-star 3s infinite;
        }

        @keyframes twinkle-star {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
        }

        .nebula-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.5) 0%, transparent 70%);
            top: 10%;
            left: 10%;
            animation: float 20s infinite ease-in-out;
        }

        .nebula-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(30, 144, 255, 0.4) 0%, transparent 70%);
            top: 50%;
            right: 10%;
            animation: float 25s infinite ease-in-out reverse;
        }

        .nebula-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(220, 20, 60, 0.3) 0%, transparent 70%);
            bottom: 10%;
            left: 50%;
            animation: float 30s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
            margin-bottom: 20px;
        }

        p {
            color: #ccc;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(30, 144, 255, 0.6);
        }

        section {
            position: relative;
            z-index: 10;
            color: white;
            padding: 100px 50px;
            background: rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">WEALTH STYLE</div>

        <nav>
            <a href="#home">Home</a>
            <a href="#shop">Shop</a>
            <a href="#cart">Cart 🛒</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <div class="space-background"></div>
    <div class="stars"></div>

    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>

    <div class="content" id="home">
        <div>
            <h1>WEALTH STYLE</h1>
            <p>Wear Your Wealth</p>
        </div>
    </div>

    <section id="shop">
        <h2>Featured Collection</h2>
        <p>Your products from Tapstitch will appear here.</p>
    </section>

    <section id="cart">
        <h2>Your Cart 🛒</h2>
        <p>Your selected items will appear here.</p>
    </section>

    <section id="contact">
        <h2>Contact Us</h2>
        <p>Email: wealthstyle@gmail.com</p>
    </section>

    <script>
        // Generate random stars
        const starsContainer = document.querySelector('.stars');
        const numberOfStars = 150;

        for (let i = 0; i < numberOfStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            
            const size = Math.random() * 3 + 0.5;
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const duration = Math.random() * 3 + 2;

            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = x + '%';
            star.style.top = y + '%';
            star.style.animationDuration = duration + 's';

            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
